name: Security audit

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "0 12 * * 1"

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run audit
