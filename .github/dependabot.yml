# Dependabot version updates.
# Security updates are enabled separately in GitHub settings and open CVE PRs
# outside this schedule when advisories land.
version: 2
updates:
  # npm (package.json / package-lock.json)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
      - github-actions 
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Bundle low-risk bumps; major version bumps stay as individual PRs.
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch

  # GitHub Actions used in .github/workflows (including SHA-pinned actions)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
